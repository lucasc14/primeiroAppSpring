<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlterarSenha</title>
    <link rel="stylesheet" th:href="@{/styles/style.css}">
</head>

<body>

    <div class="container">

        <div class="logo">
            <img src="/img/senac-logo.png" alt="Logo Senac">
        </div>

        <div class="card">

            <h1 th:text ="${tituloPagina}">Alterar Senha</h1>
            <p>Informe seus dados para redefinir sua senha.</p>

            <form>

                <label for="email">E-mail</label>
                <input type="email"id="email"placeholder="Digite seu e-mail"required
                >

                <label for="novaSenha">Nova Senha</label>
                <input type="password"id="novaSenha"placeholder="Digite a nova senha"required
                >

                <label for="confirmarSenha">Confirmar Nova Senha</label>
                <input type="password"id="confirmarSenha"placeholder="Confirme a nova senha"required
                >

                <button type="submit">
                    Alterar Senha
                </button>

            </form>

            <div class="links">
                <a href="/login">Voltar para Login</a>
            </div>
        </div>
    </div>
    <script src="../static/scripts/script.js"></script>
</body>
</html>
