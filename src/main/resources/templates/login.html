<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIGEC</title>
    <link rel="stylesheet" th:href="@{/styles/style.css}">
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="/img/senac-logo.png" alt="Logo Senac">
        </div>
        <div class="card">
            <h1 th:text ="${tituloPagina}">Bem-vindo</h1>
            <p>Sistema de Gerenciamento de Estoque de Cozinha</p>
             
            <form>

                <label for="email">E-mail</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Digite seu e-mail"
                    required
                >

                <label for="senha">Senha</label>
                <input
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha"
                    required
                >

                <button type="submit">
                    Entrar
                </button>

            </form>

            <div class="links">
                <a href="/alterarSenha">Esqueceu a senha?</a>
                <a href="/cadastro">Criar conta</a>
            </div>
        </div>
    </div>
    <script th:src="@{/scripts/script.js}"></script>
</body>
</html>
